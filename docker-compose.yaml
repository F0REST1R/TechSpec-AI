services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: techspec-ai

    restart: unless-stopped

    depends_on:
      - redis

    volumes:
      - ./:/app
      - ./generated:/app/generated
      - ./data:/app/data

    command: python main.py

    networks:
      - techspec-network

  redis:
    image: redis:7-alpine

    container_name: techspec-redis

    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    ports:
      - "6379:6379"

    networks:
      - techspec-network

volumes:
  redis_data:
  sqlite_data:
  generated_data:

networks:
  techspec-network:
    driver: bridge